<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Reha ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #1a1a2e, #16213e, #0f3460);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 80px;
        font-size: 50px;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 40px #ff4da6; }
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 30px;
        border: none;
        background: linear-gradient(45deg, #ff4da6, #ff758c);
        color: white;
        cursor: pointer;
        margin-top: 20px;
        box-shadow: 0 0 20px rgba(255,77,166,0.6);
    }

    #message {
        margin-top: 30px;
        font-size: 24px;
        white-space: pre-line;
        width: 70%;
        margin-left: auto;
        margin-right: auto;
    }

    .heart {
        position: absolute;
        color: #ff4da6;
        font-size: 20px;
        animation: floatUp linear infinite;
    }

    @keyframes floatUp {
        from { transform: translateY(100vh); opacity: 1; }
        to { transform: translateY(-10vh); opacity: 0; }
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
    }
</style>
</head>

<body>

<h1>🎉 Happy Birthday Reha ❤️ 🎂</h1>

<button onclick="startSurprise()">Click for Surprise 💖</button>

<div id="message"></div>

<audio id="music" src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav"></audio>

<canvas id="confetti"></canvas>

<script>
const text = `Hey Reha 😊
You are the most beautiful part of my life 💖
Every moment with you feels special ✨
I wish your life is filled with happiness, love, and success 🎈
Keep smiling always 🥰

— From Sehan ❤️`;

function typeEffect(text, i = 0) {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        setTimeout(() => typeEffect(text, i + 1), 40);
    }
}

function startSurprise() {
    document.getElementById("music").play();
    typeEffect(text);
    createHearts();
    startConfetti();
}

function createHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);
    }, 300);
}

// Confetti
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

function startConfetti() {
    for (let i = 0; i < 150; i++) {
        pieces.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 5 + 2,
            speed: Math.random() * 3 + 2
        });
    }
    animateConfetti();
}

function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
        ctx.fillStyle = "hsl(" + Math.random()*360 + ",100%,50%)";
        ctx.fillRect(p.x, p.y, p.size, p.size);
        p.y += p.speed;
        if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(animateConfetti);
}
</script>

</body>
</html>
