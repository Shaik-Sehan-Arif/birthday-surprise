<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Reha ❤️</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        overflow: hidden;
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 100px;
        font-size: 50px;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px white; }
        to { text-shadow: 0 0 30px yellow; }
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        background: white;
        color: #ff4081;
        cursor: pointer;
        margin-top: 30px;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    #message {
        display: none;
        font-size: 22px;
        margin-top: 30px;
        padding: 20px;
    }

    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from { transform: translateY(100vh); opacity: 1; }
        to { transform: translateY(-10vh); opacity: 0; }
    }
</style>
</head>

<body>

<h1>🎉 Happy Birthday Reha ❤️ 🎂</h1>

<button onclick="startSurprise()">Click for Surprise 💖</button>

<div id="message">
    <p>Hey Reha 😊</p>
    <p>You are the cutest and most special person 💕</p>
    <p>Thank you for being in my life ❤️</p>
    <p>May your smile never fade and your happiness never end 🎈</p>
    <p>Stay the same beautiful soul always 🥰</p>
    <p>Once again… Happy Birthday 💖✨</p>
</div>

<audio id="music" src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav"></audio>

<script>
function startSurprise() {
    document.getElementById("message").style.display = "block";
    document.getElementById("music").play();

    // create hearts
    for (let i = 0; i < 30; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);
    }
}
</script>

</body>
</html>
